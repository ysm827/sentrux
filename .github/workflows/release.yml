name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: sentrux-darwin-arm64
          - os: macos-13
            target: x86_64-apple-darwin
            artifact: sentrux-darwin-x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: sentrux-linux-x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxcb-render0-dev libxcb-shape0-dev \
            libxcb-xfixes0-dev libxkbcommon-dev libssl-dev libvulkan-dev

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}
        env:
          RUSTFLAGS: ${{ runner.os == 'Linux' && '-Clinker=gcc' || '' }}

      - name: Package binary
        run: |
          cp target/${{ matrix.target }}/release/sentrux ${{ matrix.artifact }}
          chmod +x ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            sentrux-darwin-arm64/sentrux-darwin-arm64
            sentrux-darwin-x86_64/sentrux-darwin-x86_64
            sentrux-linux-x86_64/sentrux-linux-x86_64
          generate_release_notes: true
