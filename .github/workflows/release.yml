name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: sentrux-darwin-arm64
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: sentrux-linux-x86_64
          - os: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            artifact: sentrux-linux-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: sentrux-windows-x86_64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu \
              libgtk-3-dev:arm64 libxcb-render0-dev:arm64 libxcb-shape0-dev:arm64 \
              libxcb-xfixes0-dev:arm64 libxkbcommon-dev:arm64 libssl-dev:arm64 libvulkan-dev:arm64 || \
            sudo apt-get install -y gcc-aarch64-linux-gnu
          else
            sudo apt-get install -y libgtk-3-dev libxcb-render0-dev libxcb-shape0-dev \
              libxcb-xfixes0-dev libxkbcommon-dev libssl-dev libvulkan-dev
          fi

      - name: Checkout Pro crate (private)
        uses: actions/checkout@v4
        with:
          repository: sentrux/sentrux-pro
          token: ${{ secrets.PRO_REPO_TOKEN }}
          path: sentrux-pro-checkout

      - name: Link Pro crate paths
        shell: bash
        run: |
          # Move pro checkout to where sentrux-bin expects it (../../sentrux-pro from sentrux-bin/)
          mv sentrux-pro-checkout ../sentrux-pro
          # Patch sentrux-pro Cargo.toml: replace local dev path with CI path
          sed -i.bak 's|../sentrux-fresh/sentrux-core|../sentrux/sentrux-core|' ../sentrux-pro/Cargo.toml

      - name: Set cross-compilation linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          echo "[target.aarch64-unknown-linux-gnu]" >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml

      - name: Build release binary (with Pro)
        run: cargo build --release --features pro --target ${{ matrix.target }}

      - name: Package binary
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" == windows-* ]]; then
            cp target/${{ matrix.target }}/release/sentrux.exe ${{ matrix.artifact }}
          else
            cp target/${{ matrix.target }}/release/sentrux ${{ matrix.artifact }}
            chmod +x ${{ matrix.artifact }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            sentrux-darwin-arm64/sentrux-darwin-arm64
            sentrux-linux-x86_64/sentrux-linux-x86_64
            sentrux-linux-aarch64/sentrux-linux-aarch64
            sentrux-windows-x86_64.exe/sentrux-windows-x86_64.exe
          generate_release_notes: true

      - name: Update Homebrew formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHA_DARWIN=$(sha256sum sentrux-darwin-arm64/sentrux-darwin-arm64 | cut -d' ' -f1)
          SHA_LINUX=$(sha256sum sentrux-linux-x86_64/sentrux-linux-x86_64 | cut -d' ' -f1)

          FORMULA=$(cat <<RUBY
          class Sentrux < Formula
            desc "Live codebase visualization and structural quality gate"
            homepage "https://github.com/sentrux/sentrux"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/sentrux/sentrux/releases/download/v${VERSION}/sentrux-darwin-arm64"
                sha256 "${SHA_DARWIN}"
              end
            end

            on_linux do
              on_intel do
                url "https://github.com/sentrux/sentrux/releases/download/v${VERSION}/sentrux-linux-x86_64"
                sha256 "${SHA_LINUX}"
              end
            end

            def install
              if OS.mac? && Hardware::CPU.arm?
                bin.install "sentrux-darwin-arm64" => "sentrux"
              elsif OS.linux? && Hardware::CPU.intel?
                bin.install "sentrux-linux-x86_64" => "sentrux"
              end
            end

            test do
              assert_match "sentrux", shell_output("#{bin}/sentrux --help 2>&1", 1)
            end
          end
          RUBY
          )

          FILE_SHA=$(gh api repos/sentrux/homebrew-tap/contents/Formula/sentrux.rb --jq '.sha')
          CONTENT_B64=$(echo "$FORMULA" | base64 -w0)

          gh api repos/sentrux/homebrew-tap/contents/Formula/sentrux.rb -X PUT \
            -f message="Update sentrux to v${VERSION}" \
            -f "committer[name]=yjing" \
            -f "committer[email]=yjing@sentrux.dev" \
            -f "sha=$FILE_SHA" \
            -f "content=$CONTENT_B64"
