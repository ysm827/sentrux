name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
        # Windows: tree-sitter-scss build script incompatible with MSVC
        # Will re-enable when upstream fixes -Wno-unused-parameter flag
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxcb-render0-dev libxcb-shape0-dev \
            libxcb-xfixes0-dev libxkbcommon-dev libssl-dev libvulkan-dev

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}

      - name: Build
        run: cargo build

      - name: Install language grammars
        shell: bash
        run: |
          # Download grammar bundle from latest release (not current build version)
          PLATFORM=$([ "$RUNNER_OS" = "macOS" ] && echo "darwin-arm64" || echo "linux-x86_64")
          URL="https://github.com/sentrux/sentrux/releases/latest/download/grammars-${PLATFORM}.tar.gz"
          mkdir -p ~/.sentrux/plugins
          curl -fsSL "$URL" -o /tmp/grammars.tar.gz && tar xzf /tmp/grammars.tar.gz -C ~/.sentrux/plugins/ || echo "Grammar download failed — tests requiring grammars will skip"
          # Sync configs from embedded data
          cargo run -- --version || true

      - name: Test
        run: cargo test

      - name: Build release
        run: cargo build --release
